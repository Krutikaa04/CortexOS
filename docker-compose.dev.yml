# Dev overrides: hot reload, host-mapped DB, local Studio.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  cortex-db:
    ports:
      - "5432:5432"

  cortex-model:
    ports:
      - "11434:11434"

  cortex-api:
    command: ["uvicorn", "cortex.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./api:/app
      - cortex-ingest:/data/ingest
      - cortex-traces:/data/traces

  cortex-worker:
    volumes:
      - ./api:/app
      - cortex-ingest:/data/ingest
      - cortex-traces:/data/traces

  cortex-worker-benchmark:
    volumes:
      - ./api:/app
      - cortex-ingest:/data/ingest
      - cortex-traces:/data/traces

  cortex-studio:
    image: node:22-slim
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev"]
    environment:
      NEXT_PUBLIC_CORTEX_API_URL: http://localhost:8000
    volumes:
      - ./studio:/app
    ports:
      - "3000:3000"
    networks: [cortex-public]
    depends_on:
      cortex-api:
        condition: service_healthy
