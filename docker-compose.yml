name: cortexos

services:
  cortex-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: ${CORTEX_DB_PASSWORD:?set CORTEX_DB_PASSWORD in .env}
      POSTGRES_DB: cortex
    volumes:
      - cortex-pgdata:/var/lib/postgresql/data
    networks: [cortex-internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortex"]
      interval: 5s
      timeout: 3s
      retries: 10

  cortex-model:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      CORTEX_REQUIRED_MODELS: "${CORTEX_TASK_MODEL:-qwen2.5:3b-instruct},${CORTEX_EMBED_MODEL:-nomic-embed-text}"
    volumes:
      - cortex-models:/root/.ollama
      - ./infra/ollama-entrypoint.sh:/entrypoint.sh:ro
    networks: [cortex-internal]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  cortex-migrate:
    build: ./api
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    restart: "no"
    networks: [cortex-internal]
    depends_on:
      cortex-db:
        condition: service_healthy

  cortex-api:
    build: ./api
    command: ["uvicorn", "cortex.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - cortex-ingest:/data/ingest
    networks: [cortex-internal, cortex-public]
    depends_on:
      cortex-migrate:
        condition: service_completed_successfully
      cortex-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 6

  # Ingestion lane: user-visible background work. A long benchmark can
  # never block it because this worker only claims ingestion jobs.
  cortex-worker:
    build: ./api
    command: ["python", "-m", "cortex.worker"]
    env_file: .env
    environment:
      CORTEX_WORKER_KINDS: "ingest_source"
    volumes:
      - cortex-ingest:/data/ingest
    networks: [cortex-internal]
    depends_on:
      cortex-migrate:
        condition: service_completed_successfully
      cortex-model:
        condition: service_healthy

  # Benchmark lane: long-running low-priority research work, isolated so
  # it only competes for the local model, never for the job queue.
  cortex-worker-benchmark:
    build: ./api
    command: ["python", "-m", "cortex.worker"]
    env_file: .env
    environment:
      CORTEX_WORKER_KINDS: "run_benchmark"
    volumes:
      - cortex-ingest:/data/ingest
    networks: [cortex-internal]
    depends_on:
      cortex-migrate:
        condition: service_completed_successfully
      cortex-model:
        condition: service_healthy

volumes:
  cortex-pgdata:
  cortex-models:
  cortex-ingest:

networks:
  cortex-internal:
  cortex-public:
